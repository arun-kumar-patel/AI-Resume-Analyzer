<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - GoSkillNexa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --page-bg-dark: #111439;
      --page-bg-darker: #0A0C26;
      --page-bg-lighter: #161a48;
      --page-bg-blue: #002b5c;
      --primary-accent: #00FFFF;
      --text-light: #F8F8F9;
      --card-bg: #e0e0e0;
      --card-text: #444;
      --card-shadow-dark: #bebebe;
      --card-shadow-light: #ffffff;
      --font-heading: 'Poppins', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text-light); 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, var(--page-bg-dark), var(--page-bg-darker), var(--page-bg-lighter), var(--page-bg-blue));
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    main {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        width: 100%;
    }

    .form-container {
        max-width: 400px;
        width: 100%;
        padding: 50px 40px;
        background: var(--card-bg);
        border-radius: 20px;
        box-shadow: 15px 15px 30px rgba(0,0,0,0.3),
                    -15px -15px 30px rgba(255,255,255,0.05);
        text-align: center;
    }

    .form-container h2 {
        font-family: var(--font-heading);
        font-size: 28px;
        color: var(--card-text);
        margin: 0 0 15px 0;
        font-weight: 600;
    }
    .form-container p {
        color: #666;
        margin-bottom: 30px;
    }

    .input-group {
        position: relative;
        margin-bottom: 25px;
    }

    .input-field {
        width: 100%;
        padding: 16px;
        border: none;
        outline: none;
        border-radius: 15px;
        font-size: 16px;
        box-sizing: border-box;
        background: var(--card-bg);
        color: var(--card-text);
        box-shadow: inset 7px 7px 15px var(--card-shadow-dark),
                    inset -7px -7px 15px var(--card-shadow-light);
    }
    
    .submit-btn {
        width: 100%;
        padding: 16px;
        background: var(--card-bg);
        color: var(--card-text);
        border: none;
        border-radius: 15px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        box-shadow: 7px 7px 15px var(--card-shadow-dark),
                    -7px -7px 15px var(--card-shadow-light);
    }
    .submit-btn:hover {
        color: var(--primary-accent);
        box-shadow: 5px 5px 10px var(--card-shadow-dark),
                    -5px -5px 10px var(--card-shadow-light);
    }
    .submit-btn:active {
        box-shadow: inset 7px 7px 15px var(--card-shadow-dark),
                    inset -7px -7px 15px var(--card-shadow-light);
    }

    .back-link {
        display: inline-block;
        margin-top: 30px;
        color: var(--card-text);
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: color 0.3s ease;
    }
    .back-link:hover {
        color: #000;
        text-decoration: underline;
    }
    
    /* Success Message */
    #success-message {
        display: none;
    }
    #success-message i {
        font-size: 48px;
        color: #00796b;
        margin-bottom: 15px;
    }
  </style>
</head>
<body>

<main>
    <div class="form-container">
        <div id="form-content">
            <h2>Forgot Password?</h2>
            <p>No worries! Enter your email below and we'll send you a link to reset it.</p>
            <form id="resetForm">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Enter your registered email" class="input-field" required>
                </div>
                <button type="submit" class="submit-btn">Send Reset Link</button>
            </form>
        </div>

        <div id="success-message">
            <i class="fas fa-check-circle"></i>
            <h2>Reset Link Sent!</h2>
            <p>Please check your email inbox (and spam folder) for instructions to reset your password.</p>
        </div>

        <a href="/login" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>
</main>

<script>
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formContent = document.getElementById('form-content');
        const successMessage = document.getElementById('success-message');

        // You can add email validation here if you want
        
        // Hide form and show success message
        formContent.style.display = 'none';
        successMessage.style.display = 'block';
    });
</script>

</body>
</html>
